<!-- Login Page — matches React LoginPage.jsx exactly -->
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-50 via-white to-emerald-50 relative overflow-hidden">
  <!-- Background decoration -->
  <div class="absolute top-0 left-0 w-96 h-96 bg-green-200/30 rounded-full -translate-x-1/2 -translate-y-1/2 blur-3xl"></div>
  <div class="absolute bottom-0 right-0 w-96 h-96 bg-emerald-200/30 rounded-full translate-x-1/2 translate-y-1/2 blur-3xl"></div>

  <div class="relative w-full max-w-md mx-4">
    <!-- Logo & Title -->
    <div class="text-center mb-8 animate-fadeIn">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-green-500 to-emerald-600 rounded-2xl shadow-lg shadow-green-200 mb-4">
        <lucide-icon name="stethoscope" class="text-white" [size]="36"></lucide-icon>
      </div>
      <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight">SAPA</h1>
      <p class="text-gray-500 mt-1 text-sm">Sistem Asistensi Pra-Asesmen Klinis</p>
      <p class="text-green-600 font-semibold text-xs mt-1">RS Budiman</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-xl shadow-gray-200/50 border border-gray-100 p-8 animate-slideUp">
      <h2 class="text-lg font-bold text-gray-800 mb-6">Masuk ke Akun Anda</h2>

      <!-- Error -->
      <div *ngIf="error" class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-4 text-sm">
        <lucide-icon name="alert-circle" class="text-red-500 flex-shrink-0" [size]="16"></lucide-icon> {{ error }}
      </div>

      <form (submit)="handleSubmit()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1.5">Username</label>
          <input type="text" [(ngModel)]="username" name="username" placeholder="Masukkan username" required
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500/30 focus:border-green-500 transition-all" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1.5">Password</label>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="Masukkan password" required
              class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500/30 focus:border-green-500 transition-all pr-12" />
            <button type="button" (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
              <lucide-icon *ngIf="showPassword" name="eye-off" [size]="18"></lucide-icon>
              <lucide-icon *ngIf="!showPassword" name="eye" [size]="18"></lucide-icon>
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="isLoading"
          class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-green-200 disabled:opacity-60 disabled:cursor-not-allowed">
          <span *ngIf="isLoading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          <span *ngIf="!isLoading" class="flex items-center gap-2"><lucide-icon name="log-in" [size]="18"></lucide-icon> Masuk</span>
        </button>
      </form>

      <!-- Quick Login -->
      <div class="mt-6 pt-5 border-t border-gray-100">
        <p class="text-xs text-gray-400 mb-3 text-center">Akun Demo (klik untuk isi otomatis)</p>
        <div class="grid grid-cols-2 gap-2">
          <button (click)="quickLogin('nakes1', 'nakes123')"
            class="flex flex-col items-center gap-1 px-3 py-2.5 bg-green-50 hover:bg-green-100 border border-green-200 rounded-xl text-xs transition-all">
            <span class="font-semibold text-green-700">👩‍⚕️ Nakes</span>
            <span class="text-green-600/70">Suster Ani</span>
          </button>
          <button (click)="quickLogin('dokter1', 'dokter123')"
            class="flex flex-col items-center gap-1 px-3 py-2.5 bg-blue-50 hover:bg-blue-100 border border-blue-200 rounded-xl text-xs transition-all">
            <span class="font-semibold text-blue-700">🩺 Dokter</span>
            <span class="text-blue-600/70">dr. Andi Wijaya</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-6">
      © 2026 SAPA — RS Budiman. Powered by AI.
    </p>
  </div>
</div>
