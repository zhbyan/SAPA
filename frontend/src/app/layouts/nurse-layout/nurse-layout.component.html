<div class="flex h-screen bg-gray-50 font-sans overflow-hidden relative">
  <aside class="w-[220px] bg-primary flex flex-col text-white flex-shrink-0 m-4 rounded-3xl shadow-xl overflow-hidden">
    <div class="p-5 flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-white/20 flex items-center justify-center">
        <lucide-icon name="stethoscope" class="text-white" [size]="18"></lucide-icon>
      </div>
      <span class="font-bold text-lg tracking-tight">RS Budiman</span>
    </div>

    <nav class="flex-1 px-3 mt-2 space-y-4 overflow-y-auto">
      <div *ngFor="let group of menuGroups">
        <p class="text-[10px] font-semibold uppercase tracking-widest text-white/50 px-3 mb-1.5">{{ group.title }}</p>
        <ul class="space-y-0.5">
          <li *ngFor="let item of group.items">
            <button (click)="handleMenuClick(item)"
              [class]="'w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all ' +
                (isActive(item.path) ? 'bg-white/20 text-white' : 'text-white/70 hover:bg-white/10 hover:text-white')">
              <lucide-icon [name]="item.icon" [size]="16"></lucide-icon> {{ item.label }}
            </button>
          </li>
        </ul>
      </div>
    </nav>

    <div class="p-4 border-t border-white/10">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold">
          {{ initials }}
        </div>
        <div>
          <p class="text-sm font-semibold leading-tight">{{ auth.user?.name || 'Nakes' }}</p>
          <p class="text-[11px] text-white/60">Tenaga Kesehatan</p>
        </div>
      </div>
      <button (click)="logout()" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-white/70 hover:bg-white/10 hover:text-white transition-all">
        <lucide-icon name="log-out" [size]="16"></lucide-icon> Keluar
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0">
      <h1 class="text-xl font-bold text-gray-800 tracking-tight">SISTEM RS BUDIMAN</h1>
      <div class="flex items-center gap-4">
        <button class="relative p-2 rounded-lg hover:bg-gray-100 transition-colors">
          <lucide-icon name="bell" [size]="18" class="text-gray-500"></lucide-icon>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
        <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
          <div class="w-9 h-9 rounded-full bg-primary/10 flex items-center justify-center text-primary text-sm font-bold">
            {{ initials }}
          </div>
          <div class="text-right">
            <p class="text-sm font-semibold text-gray-800">{{ auth.user?.name || 'Nakes' }}</p>
            <p class="text-xs text-gray-500">NIP: {{ auth.user?.nip || '-' }}</p>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
